<!DOCTYPE html>
<html>
<head>
    <title>Community Events Gallery</title>

    <style>
        table {
            border-collapse: collapse;
            margin: 20px auto;
        }

        td {
            padding: 15px;
            text-align: center;
        }

        .event-img {
            border: 3px solid darkblue;
            border-radius: 8px;
            width: 200px;
            height: 140px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: darkgreen;
        }
    </style>
</head>

<body>

    <table border="1">
        <caption>Community Events Image Gallery</caption>

        <tr>
            <td>
                <img src="event1.jpg" 
                     alt="Tree Plantation Event" 
                     title="Tree Plantation Drive"
                     class="event-img">
                <p><b>Tree Plantation Drive</b></p>
            </td>

            <td>
                <img src="event2.jpg" 
                     alt="Blood Donation Camp" 
                     title="Blood Donation Camp"
                     class="event-img">
                <p><b>Blood Donation Camp</b></p>
            </td>

            <td>
                <img src="event3.jpg" 
                     alt="Food Distribution Event" 
                     title="Food Distribution Program"
                     class="event-img">
                <p><b>Food Distribution Program</b></p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" 
                     alt="Cleanliness Awareness Program" 
                     title="Cleanliness Awareness"
                     class="event-img">
                <p><b>Cleanliness Awareness</b></p>
            </td>

            <td>
                <img src="event5.jpg" 
                     alt="Sports Meet Event" 
                     title="Community Sports Meet"
                     class="event-img">
                <p><b>Community Sports Meet</b></p>
            </td>

            <td>
                <img src="event6.jpg" 
                     alt="Cultural Celebration Event" 
                     title="Cultural Celebration"
                     class="event-img">
                <p><b>Cultural Celebration</b></p>
            </td>
        </tr>

    </table>

</body>
</html>
