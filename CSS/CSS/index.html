<!DOCTYPE html>
<html>
<head>
    <title>CSS Inclusion Methods</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>

        /* Body Background Style */
        body {
            background-color: #f2f2f2;
        }

    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">
        Welcome to Community Event Portal
    </h1>

    <!-- External CSS Applied -->
    <h2 class="subheading">
        Upcoming Events
    </h2>

    <p class="content">
        Explore workshops, seminars, and cultural programs.
    </p>

</body>
</html>
